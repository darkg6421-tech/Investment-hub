<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWP Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #222; color: #fff; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px; background-color: #5cb85c; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #4cae4c; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Systematic Withdrawal Plan (SWP) Calculator</h2>
        <form id="swpForm">
            <label for="investmentAmount">Investment Amount ($):</label>
            <input type="number" id="investmentAmount" required>
            
            <label for="withdrawalPercentage">Withdrawal Percentage (%):</label>
            <input type="number" id="withdrawalPercentage" required>

            <label for="frequency">Frequency of Withdrawal:</label>
            <select id="frequency">
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly</option>
                <option value="annually">Annually</option>
            </select>

            <button type="submit">Calculate</button>
        </form>
        <h3 id="result"></h3>
    </div>
    <script>
        document.getElementById('swpForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const investmentAmount = parseFloat(document.getElementById('investmentAmount').value);
            const withdrawalPercentage = parseFloat(document.getElementById('withdrawalPercentage').value);
            const frequency = document.getElementById('frequency').value;

            let withdrawalAmount;
            if (frequency === 'monthly') {
                withdrawalAmount = (investmentAmount * (withdrawalPercentage / 100)) / 12;
            } else if (frequency === 'quarterly') {
                withdrawalAmount = (investmentAmount * (withdrawalPercentage / 100)) / 4;
            } else if (frequency === 'annually') {
                withdrawalAmount = (investmentAmount * (withdrawalPercentage / 100));
            }

            document.getElementById('result').innerText = `You will withdraw $${withdrawalAmount.toFixed(2)} ${frequency}.`;
        });
    </script>
</body>
</html>
