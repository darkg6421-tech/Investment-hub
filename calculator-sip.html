<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; }
        input[type="text"], input[type="number"] { margin: 5px 0; padding: 10px; width: 100%; }
        button { padding: 10px; background-color: #1abc9c; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #16a085; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>SIP Calculator</h1>
    <form id="sipForm">
        <label for="amount">Monthly Investment Amount:</label>
        <input type="number" id="amount" required>
        <label for="rate">Expected Annual Return Rate (%):</label>
        <input type="number" id="rate" step="0.1" required>
        <label for="years">Investment Period (Years):</label>
        <input type="number" id="years" required>
        <button type="submit">Calculate</button>
    </form>
    <div class="result" id="result"></div>
    <script>
        document.getElementById('sipForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const years = parseFloat(document.getElementById('years').value);
            const months = years * 12;
            let futureValue = 0;

            for (let i = 1; i <= months; i++) {
                futureValue = futureValue * (1 + rate) + amount;
            }

            document.getElementById('result').innerHTML = `Future Value of SIP: ₹${futureValue.toFixed(2)}`;
        });
    </script>
</body>
</html>
